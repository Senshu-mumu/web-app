version: "3.9"

services:
  db:
    image: postgres:16
    container_name: postgres_todo

    ports:
      - "5432:5432"

    volumes:
      - db-store:/var/lib/postgresql/data

    environment:
      POSTGRES_DB: todo_list
      POSTGRES_USER: user
      POSTGRES_PASSWORD: postgres

volumes:
  db-store:
